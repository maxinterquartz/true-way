name: Build and Push to Cloud.ru

on:
  push:
    branches:
      - pwa-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Cloud.ru Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.CLOUD_RU_REGISTRY }}
          username: ${{ secrets.CLOUD_RU_USERNAME }}
          password: ${{ secrets.CLOUD_RU_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.CLOUD_RU_REGISTRY }}/true-way-pwa:latest
