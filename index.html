<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🔑 Трезвый водитель True Way | Вызвать водителя круглосуточно</title>
    
    <!-- SEO & Meta -->
    <meta name="description" content="Услуга трезвый водитель True Way: профессиональный водитель за руль вашего авто. Круглосуточно, без предоплаты, гарантия безопасности. Закажите прямо сейчас!">
    <meta name="keywords" content="трезвый водитель, вызвать трезвого водителя, за руль трезвый водитель, трезвый водитель цена">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="🔑 Трезвый водитель — работает везде | True Way">
    <meta property="og:description" content="Профессиональный водитель за руль вашего авто. 24/7. Безопасно и надежно.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://true-way.ru">
    
    <!-- Микроразметка Schema.org для Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Трезвый водитель",
      "provider": {
        "@type": "LocalBusiness",
        "name": "True Way",
        "image": "https://true-way.ru"
      },
      "description": "Профессиональные услуги трезвого водителя круглосуточно.",
      "areaServed": "Russia",
      "offers": {
        "@type": "Offer",
        "priceCurrency": "RUB"
      }
    }
    </script>

    <style>
        :root {
            --accent: #a3c6e0;
            --bg-gradient: linear-gradient(145deg, #1a2632 0%, #1e2f3d 100%);
            --glass-bg: rgba(10, 20, 30, 0.75);
            --glass-border: rgba(163, 198, 224, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: clamp(30px, 5vw, 60px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .domain {
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 300;
        }

        h1 {
            font-size: clamp(2rem, 7vw, 3.5rem);
            font-weight: 300;
            margin-bottom: 25px;
        }

        h1 span {
            font-weight: 800;
            color: var(--accent);
            position: relative;
            display: inline-block;
        }

        h1 span::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            opacity: 0.3;
        }

        .cta-button {
            display: block;
            background: var(--accent);
            color: #1a2632;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            margin: 30px auto;
            transition: transform 0.3s, box-shadow 0.3s;
            max-width: 320px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(163, 198, 224, 0.3);
        }

        .photo-container {
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            margin: 30px 0;
        }

        .photo-container img { width: 100%; display: block; }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 40px 0;
        }

        .step {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            border-left: 4px solid var(--accent);
            text-align: left;
        }

        .step .num { color: var(--accent); font-weight: 900; margin-right: 10px; }

        .footer-info {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-top: 40px;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }

        @media (max-width: 480px) {
            .card { padding: 25px 15px; }
            .steps { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<main class="card">
    <div class="domain">True-Way.ru</div>
    
    <h1>Услуга <span>Трезвый водитель</span></h1>
    
    <p class="sub">Ваш автомобиль — в надежных руках профессионалов. Работаем 24/7.</p>

    <a href="tel:+70000000000" class="cta-button">Вызвать водителя</a>

    <div class="photo-container">
        <img src="https://true-way.ru" alt="Трезвый водитель за рулем">
    </div>

    <div class="steps">
        <div class="step">
            <span class="num">01.</span> Звоните или пишите
        </div>
        <div class="step">
            <span class="num">02.</span> Водитель прибывает за 15-30 мин
        </div>
        <div class="step">
            <span class="num">03.</span> Безопасно едем домой
        </div>
    </div>

    <div class="footer-info">
        <p>© 2024 True Way. Конфиденциальность гарантирована. Услуга доступна для лиц старше 18 лет.</p>
    </div>
</main>

</body>
</html>
